<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sunTex" src="IMAGES_A7/Sun.jpg">
        <img id="mercuryTex" src="IMAGES_A7/mercury.jpg">
        <img id="venusTex" src="IMAGES_A7/venus.jpeg">
        <img id="earthTex" src="IMAGES_A7/earth.jpg">
        <img id="marsTex" src="IMAGES_A7/mars.png">
      </a-assets>

      <a-entity position="0 10 25">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.8"></a-entity>
      <a-entity light="type: point; intensity: 1.5; distance: 100" position="0 0 0"></a-entity>

      <a-sphere id="sun" position="0 0 0" radius="4" src="#sunTex"
                material="shader: flat;"
                animation="property: material.color; type: color; from: #FFF; to: #FF8800; dur: 4000; dir: alternate; loop: true">
      </a-sphere>

      <a-entity id="mercuryOrbit" animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        <a-sphere src="#mercuryTex" position="6 0 0" radius="0.3"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 1000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity id="venusOrbit" animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
        <a-sphere src="#venusTex" position="9 0 0" radius="0.5"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity id="earthOrbit" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-sphere src="#earthTex" position="13 0 0" radius="0.6"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity id="marsOrbit" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
        <a-sphere src="#marsTex" position="17 0 0" radius="0.4"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-sky color="#000022"></a-sky> 
    </a-scene>
  </body>
</html>
